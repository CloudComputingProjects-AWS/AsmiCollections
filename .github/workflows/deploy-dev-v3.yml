# Ashmiwebportal — Dev Deployment Workflow V3
# Trigger: push to main branch

# Required GitHub Secrets (configure in repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         — IAM deployer user access key
#   AWS_SECRET_ACCESS_KEY     — IAM deployer user secret key
#   AWS_ACCOUNT_ID            — 12-digit AWS account ID (no hyphens)
#   ECR_REPOSITORY            — ECR repo name, e.g. ashmi-backend
#   LAMBDA_FUNCTION_NAME      — Lambda function name, e.g. ashmi-backend-dev
#   S3_FRONTEND_BUCKET        — S3 bucket name, e.g. ashmi-dev-frontend
#   VITE_API_URL              — API Gateway URL for frontend .env build

# The name of the workflow.
name: Deploy aws_dev
# To automatically trigger a workflow, use on to define which events 
# can cause the workflow to run.
on:
# you can run a workflow when the push event occurss to a specific 
# branch or branches. For example, the following workflow runs when 
# you push to the main branch:
  push:
    branches:
      - main

concurrency:
  group: deploy-dev
  cancel-in-progress: true
# A map of variables that are available to the steps of all jobs in 
# the workflow.
env:
  AWS_REGION: ap-south-1

jobs:
  # —— Job 1: Backend → ECR → Lambda ——————————————————————————————————
  deploy-backend:
    name: Backend — ECR + Lambda
    # to define the type of machine to run the job on.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
      # uses: specifies an action or a reusable workflow created by others.
      # uses: actions/checkout@v6 tells GitHub Actions to use the checkout action at version 6 to get a copy of the repository's code.
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        # with: defines a mapping of input parameters or arguments required by a previous step or action.
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: backend
        # run: is a keyword used to define a command or script that should be executed by the shell.  
        run: |
          docker build -f Dockerfile.lambda \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest \
            .
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:latest
          echo "image=$ECR_REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda function to new image
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ steps.build-image.outputs.image }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

  # —— Job 2: Frontend → S3 ———————————————————————————————————————————
  deploy-frontend:
    name: Frontend — S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
